site_name: OPL Documentation
site_description: Documentation for OPL, the One Piece Language.
site_url: https://naren3333.github.io/opl/
repo_name: Naren3333/opl
repo_url: https://github.com/Naren3333/opl
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/opl-icon.png
  favicon: assets/opl-icon.png
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: blue grey
      accent: red

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Syntax: syntax.md
  - Functions: functions.md
  - Models: models.md
  - Collections: collections.md
  - Modules and Imports: modules-imports.md
  - Bytecode VM: bytecode-vm.md
  - Debugger: debugger.md
  - VSCode Extension: vscode-extension.md
  - Playground: playground.md
  - Standard Library: standard-library.md
  - Examples: examples.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      guess_lang: false
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
